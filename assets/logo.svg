<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" role="img" aria-label="Premier Luxury Interiors" focusable="false">
  <defs>
    <!-- Colors referenced by classes set in CSS via currentColor / var() -->
  </defs>

  <!-- ====== Door Mark ====== -->
  <g transform="translate(8,8)">
    <!-- Floor wedge: tan/cream triangle spilling out from doorway (perspective floor) -->
    <path class="logo-floor"
          d="M 30 142 L 110 142 L 95 130 L 38 130 Z"/>

    <!-- Door frame: tall thin rectangle outline, charcoal, open at the bottom -->
    <!-- left jamb -->
    <line class="logo-frame" x1="40"  y1="6"   x2="40"  y2="142"/>
    <!-- right jamb -->
    <line class="logo-frame" x1="100" y1="6"   x2="100" y2="142"/>
    <!-- header -->
    <line class="logo-frame" x1="40"  y1="6"   x2="100" y2="6"/>

    <!-- Open door panel: sage green parallelogram swung inward from the left hinge -->
    <!-- Hinge stays on the left jamb; the leading edge swings inward into the doorway. -->
    <path class="logo-door"
          d="M 41 8 L 78 18 L 78 124 L 41 134 Z"/>

    <!-- Tiny door knob -->
    <circle class="logo-knob" cx="73" cy="78" r="1.6"/>

    <!-- Subtle inside-jamb line showing depth on the right side of the open door -->
    <line class="logo-frame" x1="78" y1="18" x2="78" y2="124" stroke-opacity="0.0"/>
  </g>

  <!-- ====== Wordmark "PREMIER" ====== -->
  <text x="160" y="92"
        class="logo-wordmark"
        text-anchor="start">PREMIER</text>

  <!-- ====== Tagline "LUXURY INTERIORS" ====== -->
  <text x="161" y="128"
        class="logo-tagline"
        text-anchor="start">LUXURY INTERIORS</text>
</svg>
